<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BugTracker Pro | Admin Portal</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <div id="login-section" class="login-container">
        <div class="card shadow login-card">
            <div class="card-body">
                <div class="text-center mb-4">
                    <h2 class="fw-bold">BugTracker Pro</h2>
                    <p class="text-muted">Single Sign-On (Admin)</p>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" id="username" class="form-control" placeholder="admin">
                </div>
                
                <div class="mb-4">
                    <label class="form-label">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="admin123">
                </div>
                
                <button class="btn btn-primary w-100 py-2" onclick="handleLogin()">Login</button>
            </div>
        </div>
    </div>

    <div id="app-content" class="d-none">
        <nav class="navbar navbar-dark bg-dark px-4 py-3 shadow-sm">
            <span class="navbar-brand fw-bold">BugTracker Pro</span>
            <div class="d-flex align-items-center">
                <span class="text-light me-3 small">Logged in as: <strong>Admin</strong></span>
                <button class="btn btn-outline-danger btn-sm" onclick="handleLogout()">Logout</button>
            </div>
        </nav>
        
        <main class="container-fluid p-4">
            <div id="main-ui">
                 <div class="alert alert-success border-0 shadow-sm">
                    <h4 class="alert-heading">Welcome Back!</h4>
                    <p>The system is initialized and LocalStorage is active.</p>
                 </div>
                 
                 </div>
        </main>
    </div>

    <script src="storage.js"></script>
</body>
</html>
